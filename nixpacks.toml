[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "cd server && python3 -m venv .venv && .venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "npm run build"
]

[phases.start]
cmd = "cd server && .venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
